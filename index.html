<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUTOGRAPH CAM - Painel</title>
    <style>
        :root { --turquesa: #00d1d1; --dourado: #c5a059; --bg: #001a1a; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        .logo-container { margin-bottom: 40px; }
        .logo-container h1 { 
            color: var(--dourado); 
            font-size: 2.5rem; 
            margin: 0; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-weight: 900;
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
        }
        .logo-container p { 
            font-size: 12px; 
            letter-spacing: 5px; 
            opacity: 0.8; 
            margin-top: 5px; 
            color: var(--turquesa);
        }

        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 90%; 
            max-width: 400px; 
        }

        .menu-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dourado);
            padding: 25px 10px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
        }

        .menu-item:active { transform: scale(0.95); background: var(--dourado); color: black; }
        .menu-item i { font-size: 24px; }
        
        /* Botão de destaque para a Câmera */
        .btn-main { grid-column: 1 / span 2; background: var(--dourado); color: black; font-size: 18px; }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1>AUTOGRAPH CAM</h1>
        <p>MAX PRIME FOTO & VIDEO</p>
    </div>

    <div class="menu-grid">
        <a href="camera.html" class="menu-item btn-main">
            <span>📷 ABRIR CÂMERA</span>
        </a>

        <a href="config_evento.html" class="menu-item">
            <span>⚙️ CONFIGURAR</span>
        </a>

        <a href="galeria.html" class="menu-item">
            <span>🖼️ GALERIA</span>
        </a>

        <a href="galeria_admin.html" class="menu-item">
            <span>🔐 ADMIN</span>
        </a>

        <a href="index.html" class="menu-item" style="opacity: 0.5;">
            <span>🔄 RECARREGAR</span>
        </a>
    </div>

    <script>
        // Verificação rápida de configuração para evitar erros
        window.onload = () => {
            const config = localStorage.getItem('config_atual');
            if (!config) {
                console.log("Sistema aguardando configuração de evento.");
            }
        };
    </script>
</body>
</html>
