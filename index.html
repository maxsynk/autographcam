<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTRAL - AUTOGRAPH CAM</title>
    <style>
        :root { 
            --bg-deep: #0E1A25;
            --bg-surface: #182232;
            --accent: #69829E;
            --text-main: #EFEEE9;
            --text-dim: #A0B0C0;
            --danger: rgba(255, 85, 85, 0.8);
        }
        
        body { 
            margin: 0; background: var(--bg-deep); color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header { margin-top: 1.8cm; text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--text-main); font-size: 52px; font-weight: 900; letter-spacing: 3px; margin: 0; text-transform: uppercase; animation: pulse-blue 3s infinite ease-in-out; }
        .header p { color: var(--accent); font-size: 20px; margin: -5px 0 0 0; letter-spacing: 4px; font-weight: 300; text-transform: lowercase; opacity: 0.9; }

        @keyframes pulse-blue {
            0%, 100% { text-shadow: 0 0 5px rgba(105, 130, 158, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(105, 130, 158, 0.5); transform: scale(1.02); }
        }

        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; width: 92%; max-width: 500px; }

        .btn-central {
            width: 100%; padding: 22px; margin: 10px 0; border-radius: 12px;
            text-transform: uppercase; font-weight: 800; font-size: 16px;
            cursor: pointer; text-decoration: none; text-align: center;
            display: none; box-sizing: border-box; transition: all 0.3s ease;
        }

        #btn-login { display: block; background: transparent; color: var(--accent); border: 2px solid var(--accent); margin-top: 50px; }
        #btn-create { background: var(--accent); color: var(--text-main); border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #btn-admin { background: rgba(105, 130, 158, 0.1); color: var(--text-main); border: 1px solid var(--accent); }
        #btn-galeria { background: rgba(105, 130, 158, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        #btn-copy-link { background: rgba(105, 130, 158, 0.1); color: var(--accent); border: 1px solid var(--accent); margin-bottom: 25px; }

        .event-list-container { width: 100%; margin-top: 30px; display: none; }
        .event-card {
            background: var(--bg-surface); border: 2px solid rgba(105, 130, 158, 0.1);
            padding: 15px; border-radius: 20px; margin-bottom: 18px;
            display: grid; grid-template-columns: 1fr 100px; gap: 10px;
        }
        
        .event-card.active-border { border-color: var(--accent); background: rgba(105, 130, 158, 0.05); }
        .event-info h4 { margin: 0; color: var(--text-main); text-transform: uppercase; font-size: 18px; line-height: 1.2; }
        .event-info span { font-size: 11px; color: var(--text-dim); display: block; margin-top: 4px; }

        .btn-camera-main {
            background: var(--accent); color: var(--text-main);
            border: none; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; cursor: pointer; transition: 0.2s;
            grid-row: span 2;
        }

        .group-actions-row { display: flex; gap: 8px; width: 100%; margin-top: 12px; }
        .status-btn {
            flex: 2; padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; border: none;
        }
        .btn-is-on { background: var(--accent); color: var(--text-main); }
        .btn-is-off { background: #0A121A; color: #4A5A6A; border: 1px solid #1C2C3C; }

        .btn-edit-big { flex: 1.5; background: #2A3A4A; color: #fff; border: 1px solid #3A4A5A; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 10px; }
        .btn-del-big { flex: 0.8; background: rgba(255, 85, 85, 0.1); color: #ff5555; border: 1px solid #ff5555; border-radius: 10px; cursor: pointer; font-size: 16px; }

        #modal-senha { position: fixed; inset: 0; background: rgba(14, 26, 37, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(15px); }
        .modal-content { background: var(--bg-surface); padding: 35px; border-radius: 25px; border: 1px solid var(--accent); text-align: center; width: 85%; max-width: 320px; }
        .modal-content input { width: 100%; padding: 18px; background: #000; border: 1px solid var(--accent); color: var(--text-main); border-radius: 12px; text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 25px; box-sizing: border-box; outline: none; }
        .btn-confirm { background: var(--accent); color: var(--text-main); border: none; padding: 15px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>AUTOGRAPH CAM</h1>
        <p>colecionando momentos</p>
    </div>

    <div class="main-container">
        <button id="btn-login" class="btn-central" onclick="abrirModal()">🔓 ACESSAR SISTEMA</button>
        <a href="config_evento.html" id="btn-create" class="btn-protected btn-central" onclick="localStorage.removeItem('evento_para_editar')">➕ CRIAR NOVO EVENTO</a>
        <a href="galeria_admin.html" id="btn-admin" class="btn-protected btn-central">👑 GALERIA ADMIN</a>
        <a href="galeria.html" id="btn-galeria" class="btn-protected btn-central">🎞️ ABRIR GALERIA</a>
        <button id="btn-copy-link" class="btn-protected btn-central" onclick="copiarLinkCliente()">🔗 COPIAR LINK CLIENTE</button>
        
        <div id="container-eventos" class="event-list-container">
            <h3 style="font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center;">Painel de Eventos</h3>
            <div id="lista-eventos"></div>
        </div>

        <button id="btn-lock" class="btn-protected btn-central" onclick="bloquear()" style="background: transparent; color: #ff5555; border: 1px solid rgba(255,85,85,0.3); margin-top: 40px; font-size: 12px;">SAIR DO SISTEMA</button>
    </div>

    <div id="modal-senha">
        <div class="modal-content">
            <h3 style="color:var(--text-main); letter-spacing: 2px;">SENHA MESTRA</h3>
            <input type="password" id="input-senha" inputmode="numeric" placeholder="••••">
            <button class="btn-confirm" onclick="validarSenha()">ENTRAR</button>
            <p onclick="fecharModal()" style="margin-top:20px; font-size:13px; color:var(--text-dim); cursor:pointer">Voltar</p>
        </div>
    </div>

<script>
    const SENHA_MESTRA = ""; 
    const WORKER_URL = "https://autographcam.maxprimefotovideo.workers.dev";

    window.onload = () => { if(sessionStorage.getItem('logado') === 'true') liberarSistema(); }

    function abrirModal() { document.getElementById('modal-senha').style.display = 'flex'; document.getElementById('input-senha').focus(); }
    function fecharModal() { document.getElementById('modal-senha').style.display = 'none'; document.getElementById('input-senha').value = ''; }

    function validarSenha() {
        if (document.getElementById('input-senha').value === SENHA_MESTRA) {
            sessionStorage.setItem('logado', 'true');
            fecharModal();
            liberarSistema();
        } else { alert("Senha Incorreta"); }
    }

    function liberarSistema() {
        document.getElementById('btn-login').style.display = 'none';
        document.querySelectorAll('.btn-protected').forEach(b => b.style.display = 'block');
        document.getElementById('container-eventos').style.display = 'block';
        renderEventos();
    }

    function copiarLinkCliente() {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if (!config) { alert("Ative um evento primeiro!"); return; }
        const idEvento = config.id_fixo || config.nome;
        const link = `https://maxsynk.github.io/autographcam/galeria.html?evento=${encodeURIComponent(idEvento)}`;
        navigator.clipboard.writeText(link).then(() => { alert("Link copiado!"); });
    }

    async function renderEventos() {
    const container = document.getElementById('lista-eventos');
    const eventoAtivoConfig = JSON.parse(localStorage.getItem('config_atual'));

    try {
        const res = await fetch(`${WORKER_URL}/listar-eventos?t=${Date.now()}`);
        const eventos = await res.json();
        
        if(!eventos || eventos.length === 0) { 
            container.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:20px;">Sem eventos cadastrados.</p>'; 
            return; 
        }

        container.innerHTML = '';
        eventos.forEach((ev) => {
            // Ajuste para usar as colunas novas do banco
            const nomeExibicao = ev.nome_visual || ev.evento_id || "Evento Sem Nome";
            const idPasta = ev.evento_id; 

            const estaAtivo = eventoAtivoConfig && (
                eventoAtivoConfig.id === ev.id || 
                eventoAtivoConfig.id_fixo === idPasta
            );

            const evData = JSON.stringify(ev).replace(/"/g, '&quot;');
            const card = document.createElement('div');
            card.className = `event-card ${estaAtivo ? 'active-border' : ''}`;
            card.innerHTML = `
                <div class="event-info-col">
                    <div class="event-info">
                        <h4>${nomeExibicao.replace(/_/g, ' ')}</h4>
                        <span>ID: ${idPasta}</span>
                    </div>
                    <div class="group-actions-row">
                        <button class="status-btn ${estaAtivo ? 'btn-is-on' : 'btn-is-off'}" onclick='alternarAtivacao(${evData})'>
                            ${estaAtivo ? '● SELECIONADO' : 'SELECIONAR'}
                        </button>
                        <button class="btn-edit-big" onclick='irParaEditar(${evData})'>CONFIG</button>
                        <button class="btn-del-big" onclick="excluirEvento('${ev.id}', '${idPasta}')">×</button>
                    </div>
                </div>
                <button class="btn-camera-main" onclick="irParaCamera(${evData})">📸</button>
            `;
            container.appendChild(card);
        });
    } catch (err) { 
        container.innerHTML = `<p style="color: #ff5555; text-align:center;">Erro ao carregar eventos do servidor.</p>`; 
    }
}

async function excluirEvento(id, nomePasta) {
    if(confirm(`ATENÇÃO: Apagar evento e todos os arquivos?`)) {
        try { 
            const res = await fetch(`${WORKER_URL}/deletar-evento-completo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, evento: nomePasta })
            });
            
            if(res.ok) {
                alert("Evento excluído com sucesso!");
                renderEventos(); 
            } else {
                alert("Erro ao excluir do servidor.");
            }
        } catch (e) { 
            alert("Erro de conexão ao deletar."); 
        }
    }
}
    function bloquear() { sessionStorage.removeItem('logado'); location.reload(); }
</script>
</body>
</html>
