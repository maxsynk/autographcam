<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN - AUTOGRAPH CAM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { 
            --bg-deep: #0E1A25;
            --bg-surface: #182232;
            --accent: #69829E;
            --text-main: #EFEEE9;
            --danger: #ff4d4d;
        }
        
        body { background: var(--bg-deep); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-deep);
        }

        .header { 
            padding: 20px; 
            border-bottom: 2px solid var(--accent); 
            background: rgba(14, 26, 37, 0.9); 
            backdrop-filter: blur(15px);
            position: relative;
        }

        .header h1 { color: var(--text-main); letter-spacing: 5px; margin: 0; text-transform: uppercase; font-size: 1.8rem; font-weight: 900; }
        .subtitle { font-size: 11px; letter-spacing: 4px; opacity: 0.9; margin-top: 2px; text-transform: uppercase; color: var(--accent); }
        .admin-label { font-size: 14px; color: var(--accent); letter-spacing: 2px; margin-top: 5px; font-weight: bold; }

        /* Botão Hamburger */
        .menu-icon {
            position: absolute;
            top: 25px;
            right: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 110;
        }
        .menu-icon div { width: 25px; height: 3px; background: var(--accent); border-radius: 2px; transition: 0.3s; }

        /* Painel do Submenu */
        .admin-tools { 
            position: absolute;
            top: 70px;
            right: 10px;
            background: var(--bg-surface);
            border: 1px solid var(--accent);
            border-radius: 12px;
            display: none; 
            flex-direction: column; 
            gap: 10px; 
            padding: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 105;
        }

        .event-info-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            margin-top: 15px;
            padding-left: 10px;
        }
        .v-line { width: 2px; height: 30px; background: var(--accent); border-radius: 2px; margin-right: 10px; }
        #nome-evento-titulo { 
            color: var(--accent); 
            font-size: 13px; 
            margin: 0; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            font-weight: bold;
            text-align: left;
        }

        .search-area { 
            padding: 15px; 
            background: rgba(0,0,0,0.5); 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            border-bottom: 1px solid rgba(105, 130, 158, 0.2);
            backdrop-filter: blur(10px);
        }
        .search-area input { 
            width: 180px; 
            padding: 12px; border-radius: 8px; 
            border: 1px solid var(--accent); background: #000; color: var(--accent); 
            text-align: center; font-weight: bold; outline: none; font-size: 18px;
        }
        .btn-busca { background: var(--accent); color: var(--bg-deep); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; padding-bottom: 120px; }

        .video-card { 
            background: #000; border: 1px solid rgba(105, 130, 158, 0.3); border-radius: 12px; 
            overflow: hidden; aspect-ratio: 9/16; position: relative; cursor: pointer;
        }
        .video-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .video-id-badge { position: absolute; top: 8px; left: 8px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-weight: 900; font-size: 12px; z-index: 10; }
        .btn-del-mini { position: absolute; top: 8px; right: 8px; background: var(--danger); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; z-index: 20; }

        #modal-zoom { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #media-full { width: 85%; max-height: 70vh; border: 2px solid var(--accent); border-radius: 15px; background: #000; }
        .modal-controls { margin-top: 25px; display: flex; gap: 10px; width: 85%; justify-content: center; flex-wrap: wrap; }
        .btn-action { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 12px; text-transform: uppercase; }
        .btn-close { background: #333; color: white; }
        .btn-download { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-zip { background: #28a745; color: white; }
        .nav-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 500; width: 90%; }
    </style>
</head>
<body>

    <div class="sticky-top">
        <div class="header">
            <div class="menu-icon" onclick="toggleMenu()">
                <div></div><div></div><div></div>
            </div>
            <h1>AUTOGRAPH CAM</h1>
            <p class="subtitle">COLECIONANDO MOMENTOS</p>
            <div class="admin-label">GALERIA ADMIN</div>
            
            <div class="event-info-container">
                <div class="v-line"></div>
                <p id="nome-evento-titulo">SINCRONIZANDO...</p>
            </div>

            <div id="admin-tools" class="admin-tools">
                <button class="btn-action btn-zip" onclick="baixarTudoZip()">📦 BAIXAR TODOS (ZIP)</button>
                <button class="btn-action btn-danger" onclick="excluirTudo()">⚠️ APAGAR GALERIA</button>
            </div>
        </div>

        <div class="search-area">
            <input type="number" id="input-busca" placeholder="Nº VÍDEO">
            <button class="btn-busca" onclick="executarBusca()">🔍 PESQUISAR</button>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div class="nav-footer">
        <a href="index.html" class="btn-action btn-close" style="display: block; text-align: center; background: rgba(105, 130, 158, 0.1); color: var(--accent); border: 1px solid var(--accent);">← VOLTAR</a>
    </div>

    <div id="modal-zoom">
        <video id="media-full" controls playsinline crossorigin="anonymous"></video>
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <button id="btn-download-force" class="btn-action btn-download">BAIXAR MP4</button>
            <button id="btn-delete-modal" class="btn-action btn-danger">EXCLUIR VÍDEO</button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    let listaFinais = [];
    let idPastaFixo = ""; 

    window.onload = () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if(!config) { window.location.href = "index.html"; return; }
        document.getElementById('nome-evento-titulo').innerText = (config.nome || "").replace(/_/g, ' ');
        idPastaFixo = config.id_fixo || config.nome; 
        carregarArquivos();
        setInterval(carregarArquivos, 3000);
    };

    function toggleMenu() {
        const tools = document.getElementById('admin-tools');
        tools.style.display = tools.style.display === 'flex' ? 'none' : 'flex';
    }

    async function carregarArquivos() {
        try {
            const res = await fetch(`${WORKER_URL}/listar-galeria?evento=${encodeURIComponent(idPastaFixo)}`);
            const dados = await res.json();
            const novosFinais = dados.filter(f => f.path.includes('autograph_') || f.path.includes('final_'));
            if (JSON.stringify(novosFinais) !== JSON.stringify(listaFinais)) {
                listaFinais = novosFinais;
                renderizarGaleria();
            }
        } catch (e) { console.error("Erro ao carregar arquivos."); }
    }

    function renderizarGaleria() {
        const container = document.getElementById('gallery-container');
        container.innerHTML = "";
        if (listaFinais.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5; margin-top:50px;'>Nenhum vídeo encontrado.</p>";
            return;
        }
        listaFinais.forEach((file, index) => {
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-id-badge">#${index + 1}</div>
                <button class="btn-del-mini" onclick="event.stopPropagation(); excluirArquivo('${file.path}')">X</button>
                <video src="${url}#t=0.5" muted playsinline></video>
            `;
            card.onclick = () => abrirZoom(url, file.path);
            container.appendChild(card);
        });
    }

    function executarBusca() {
        const num = document.getElementById('input-busca').value;
        if (!num) return;
        const index = parseInt(num) - 1;
        if (listaFinais[index]) {
            const file = listaFinais[index];
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
            abrirZoom(url, file.path);
            document.getElementById('input-busca').value = '';
        } else { alert("Vídeo #" + num + " não encontrado!"); }
    }

    function abrirZoom(url, path) {
        const modal = document.getElementById('modal-zoom');
        const video = document.getElementById('media-full');
        modal.style.display = 'flex';
        video.src = url;
        video.play();
        document.getElementById('btn-download-force').onclick = () => forcarDownload(url, path.split('/').pop());
        document.getElementById('btn-delete-modal').onclick = () => { excluirArquivo(path); fecharZoom(); };
    }

    async function excluirArquivo(path) {
        if(!confirm("Excluir vídeo?")) return;
        await fetch(`${WORKER_URL}/deletar`, { method: 'POST', body: JSON.stringify({ id: path, evento: idPastaFixo }) });
        carregarArquivos();
    }

    async function excluirTudo() {
        if(prompt("Digite 'apagar':") !== 'apagar') return;
        for(let f of listaFinais) {
            await fetch(`${WORKER_URL}/deletar`, { method: 'POST', body: JSON.stringify({ id: f.path, evento: idPastaFixo }) });
        }
        carregarArquivos();
    }

    async function baixarTudoZip() {
        const btn = document.querySelector('.btn-zip');
        const originalText = btn.innerText;
        btn.innerText = "⏳ PROCESSANDO...";
        const zip = new JSZip();
        for(let i = 0; i < listaFinais.length; i++) {
            const res = await fetch(`${WORKER_URL}/stream?id=${encodeURIComponent(listaFinais[i].path)}`);
            zip.file(`video_${i+1}.mp4`, await res.blob());
        }
        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, `Galeria_Admin_${idPastaFixo}.zip`);
        btn.innerText = originalText;
        toggleMenu();
    }

    async function forcarDownload(url, filename) {
        const res = await fetch(url);
        saveAs(await res.blob(), filename);
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('media-full').pause();
        document.getElementById('media-full').src = "";
    }
</script>
</body>
</html>
