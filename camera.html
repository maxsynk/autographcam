<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUTOGRAPH CAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #video-preview { width: 100%; height: 100vh; object-fit: cover; }
        .contador-overlay { 
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
            font-size: 80px; color: #ff0000; font-weight: 900; 
            text-shadow: 0 0 20px #000; z-index: 100; display: none;
        }
    </style>
</head>
<body class="bg-black h-screen overflow-hidden">

    <div id="contador" class="contador-overlay">0s</div>
    
    <video id="video-preview" autoplay playsinline muted></video>

    <div class="absolute bottom-10 w-full flex justify-center z-50">
        <button id="btn-record" onclick="controleGravacao()" class="bg-white p-2 rounded-full shadow-2xl">
            <div id="btn-inner" class="w-16 h-16 bg-red-600 rounded-full border-4 border-gray-200"></div>
        </button>
    </div>

    <div id="loading" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center z-[200]">
        <div class="w-12 h-12 border-4 border-t-red-600 border-gray-400 rounded-full animate-spin"></div>
        <p class="text-white mt-4 font-bold">PROCESSANDO VÍDEO...</p>
    </div>

    <script>
        const WORKER_URL = "https://autographcam.maxprimefotovideo.workers.dev";
        const videoElement = document.getElementById('video-preview');
        const displayContador = document.getElementById('contador');
        const loader = document.getElementById('loading');
        
        let mediaRecorder;
        let recordedChunks = [];
        let tempoTotal = 10; // Tempo fixo para teste
        let streamPrincipal;

        // Pega o ID do evento da URL
        const params = new URLSearchParams(window.location.search);
        const eventoId = params.get('evento') || "Geral";

        async function init() {
            try {
                streamPrincipal = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: true 
                });
                videoElement.srcObject = streamPrincipal;
            } catch (err) {
                alert("Câmera bloqueada ou não encontrada.");
            }
        }

        async function controleGravacao() {
            document.getElementById('btn-record').disabled = true;
            recordedChunks = [];
            
            // Configura o gravador
            mediaRecorder = new MediaRecorder(streamPrincipal, { mimeType: 'video/webm;codecs=vp8' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                loader.style.display = 'flex';
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                await enviarAoWorker(blob);
            };

            mediaRecorder.start();
            rodarContador();
        }

        function rodarContador() {
            let seg = 0;
            displayContador.style.display = 'block';
            displayContador.innerText = seg + "s";

            let intervalo = setInterval(() => {
                seg++;
                displayContador.innerText = seg + "s";
                
                if (seg >= tempoTotal) {
                    clearInterval(intervalo);
                    pararTudo();
                }
            }, 1000);
        }

        function pararTudo() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            displayContador.style.display = 'none';
        }

        async function enviarAoWorker(blob) {
            const nomeArquivo = `vid_${Date.now()}.webm`;
            const fd = new FormData();
            fd.append('video', blob);
            fd.append('uuid', nomeArquivo);
            fd.append('evento', eventoId);

            try {
                const res = await fetch(`${WORKER_URL}/upload`, { method: 'POST', body: fd });
                if (res.ok) {
                    window.location.href = `galeria.html?evento=${eventoId}`;
                } else {
                    alert("Erro no upload do Worker.");
                    location.reload();
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
