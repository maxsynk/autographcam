<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Pro - AUTOGRAPH CAM</title>
    <style>
        :root { 
            --bg-deep: #0E1A25;
            --bg-surface: #182232;
            --accent: #69829E;
            --text-main: #EFEEE9;
        }
        
        body { margin: 0; background: var(--bg-deep); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #cam-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #moldura-view { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            pointer-events: none; object-fit: fill; z-index: 10; 
            display: none; 
        }

        .event-overlay {
            position: absolute; top: 30px; width: 100%; text-align: center;
            z-index: 20; color: var(--text-main); text-transform: uppercase;
            letter-spacing: 3px; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .event-sub {
            display: block; font-size: 12px; font-weight: 300; letter-spacing: 5px;
            color: var(--accent); text-transform: lowercase; margin-top: 5px;
        }

        #timer-regressivo {
            display: none; color: #FFF; font-size: 18px; font-weight: bold;
            margin-top: 10px; opacity: 0.9;
        }

        .controls-wrapper {
            position: absolute; bottom: 60px; width: 100%;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100;
        }

        .side-btn {
            background: rgba(14, 26, 37, 0.6); border: 1.5px solid var(--accent);
            color: var(--text-main); width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 22px; backdrop-filter: blur(10px);
        }

        .shutter-trigger { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: transparent; border: 5px solid var(--accent); 
            cursor: pointer; position: relative; z-index: 105;
        }
        .shutter-trigger::after {
            content: ''; position: absolute; inset: -12px;
            border-radius: 50%; border: 2px solid var(--accent);
            animation: pulse-blue 1.5s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        #status { position: fixed; inset: 0; display: none; background: rgba(14, 26, 37, 0.4); color: var(--text-main); font-size: 140px; align-items: center; justify-content: center; z-index: 200; font-weight: 900; text-shadow: 0 0 30px var(--accent); }
        
        #loading { 
            position: fixed; inset: 0; display: none; background: var(--bg-deep); color: var(--text-main); 
            align-items: center; justify-content: center; z-index: 600; flex-direction: column; gap: 20px; 
        }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(105, 130, 158, 0.1); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="cam-container">
        <div class="event-overlay">
            <span id="txt-evento">AUTOGRAPH CAM</span>
            <span class="event-sub">colecionando momentos</span>
            <div id="timer-regressivo">0s</div>
        </div>
        
        <video id="preview" autoplay playsinline muted></video>
        <img id="moldura-view" alt="moldura">

        <div class="controls-wrapper">
            <div class="side-btn" onclick="window.location.href='index.html'">✕</div>
            <div class="shutter-container">
                <div class="shutter-trigger" id="btn-shoot"></div>
            </div>
            <div class="side-btn" onclick="toggleCamera()">🔄</div>
        </div>
    </div>

    <canvas id="canvas" width="720" height="1280" style="display:none;"></canvas>
    <div id="status"></div>
    
    <div id="loading">
        <div class="spinner"></div>
        <b style="letter-spacing: 3px; font-size: 12px; color: var(--accent);">PROCESSANDO VÍDEO...</b>
    </div>

<script>
    const WORKER_URL = "https://photomovie.maxprimefotovideo.workers.dev";
    const video = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn-shoot');
    const view = document.getElementById('moldura-view');
    const timerDisplay = document.getElementById('timer-regressivo');
    
    let currentStream;
    let useFrontCamera = false;
    let recorder;
    let chunks = [];
    const molduraImg = new Image();
    molduraImg.crossOrigin = "anonymous"; 

    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(track => track.stop());
        const constraints = {
            video: { facingMode: useFrontCamera ? "user" : "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
        } catch (e) { alert("Erro ao acessar câmera."); }
    }

    function toggleCamera() {
        useFrontCamera = !useFrontCamera;
        startCamera();
    }

    window.onload = async () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if (config) {
            document.getElementById('txt-evento').innerText = config.nome.replace(/_/g, ' ') || "AUTOGRAPH CAM";
            let molduraPath = config.molduraUrl || config.moldura;
            if (molduraPath) {
                const urlFinal = `${WORKER_URL}/stream?id=${molduraPath.includes('id=') ? molduraPath.split('id=')[1] : molduraPath}`;
                molduraImg.src = urlFinal;
                view.src = urlFinal;
                molduraImg.onload = () => view.style.display = 'block';
            }
        }
        startCamera();
    };

    btn.onclick = () => {
        let c = 3;
        const status = document.getElementById('status');
        status.style.display = 'flex';
        status.innerText = c;
        
        let t = setInterval(() => {
            c--;
            if(c > 0) status.innerText = c;
            else { 
                clearInterval(t); 
                status.style.display = 'none'; 
                iniciarGravacao(); 
            }
        }, 1000);
    };

    function iniciarGravacao() {
        chunks = [];
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const segsTotais = (config ? parseInt(config.tempo) : 10);
        const nomeEvento = config ? (config.nome.replace(/\s+/g, '_')) : "Geral";

        // Prepara o stream do canvas ANTES de tudo
        const stream = canvas.captureStream(30);
        
        // Inicializa o recorder
        recorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp8', 
            videoBitsPerSecond: 5000000 
        });
        
        recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        
        recorder.onstop = async () => {
            timerDisplay.style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            await enviarVideo(chunks, nomeEvento);
        };

        // LOOP DE DESENHO (Inicia antes do start para ter frame pronto)
        const loop = () => {
            if (video.paused || video.ended) return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            if (molduraImg.complete) ctx.drawImage(molduraImg, 0, 0, canvas.width, canvas.height);
            if (recorder && recorder.state === "recording") {
                requestAnimationFrame(loop);
            }
        };

        // INICIA GRAVAÇÃO
        recorder.start();
        loop(); 

        // INICIA CONTADOR
        let tempoRestante = segsTotais;
        timerDisplay.style.display = 'block';
        timerDisplay.innerText = tempoRestante + "s";

        let timerInt = setInterval(() => {
            tempoRestante--;
            if(tempoRestante <= 0) {
                clearInterval(timerInt);
                timerDisplay.innerText = "0s";
                if(recorder && recorder.state === "recording") {
                    recorder.stop();
                }
            } else {
                timerDisplay.innerText = tempoRestante + "s";
            }
        }, 1000);
    }

    async function enviarVideo(videoChunks, nomeEvento) {
        if (videoChunks.length === 0) {
            alert("Erro: Nenhum dado de vídeo capturado.");
            document.getElementById('loading').style.display = 'none';
            return;
        }

        const blob = new Blob(videoChunks, { type: 'video/webm' });
        const fd = new FormData();
        fd.append("video", blob);
        fd.append("uuid", "autograph_" + Date.now() + ".webm");
        fd.append("evento", nomeEvento);

        try {
            const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
            if(res.ok) {
                window.location.href = "galeria.html";
            } else {
                alert("Erro no upload do arquivo.");
            }
        } catch (err) { 
            alert("Erro de rede durante o envio."); 
        }
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
