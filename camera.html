<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUTOGRAPH CAM - Gravando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #video-preview { transform: scaleX(-1); width: 100%; height: 100vh; object-fit: cover; }
        .contador { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: white; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); display: none; z-index: 50; }
    </style>
</head>
<body class="bg-black overflow-hidden h-screen flex flex-col">

    <!-- Preview da Câmera -->
    <video id="video-preview" autoplay playsinline muted></video>

    <!-- Contador Progressivo -->
    <div id="contador-display" class="contador">0s</div>

    <!-- Botão de Ação -->
    <div class="absolute bottom-10 w-full flex justify-center items-center px-10 z-40">
        <button id="btn-record" onclick="iniciarGravacao()" class="bg-red-600 text-white w-20 h-20 rounded-full border-4 border-white shadow-lg active:scale-90 transition-all"></button>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let timerInterval;
        let tempoGravacao = 5; // Ajuste para o tempo que desejar
        const urlParams = new URLSearchParams(window.location.search);
        const eventoId = urlParams.get('evento');
        const WORKER_URL = "https://autographcam.maxprimefotovideo.workers.dev";

        // Inicia o preview da câmera ao abrir a página
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1280, height: 720 }, 
                    audio: true 
                });
                document.getElementById('video-preview').srcObject = stream;
                window.localStream = stream;
            } catch (err) {
                alert("Erro ao acessar câmera: " + err);
            }
        }

        async function iniciarGravacao() {
            const btn = document.getElementById('btn-record');
            const display = document.getElementById('contador-display');
            
            btn.disabled = true;
            btn.classList.add('opacity-50', 'scale-75');
            display.style.display = 'block';
            
            recordedChunks = [];
            let tempoAtual = 0;
            display.innerText = "0s";

            mediaRecorder = new MediaRecorder(window.localStream, { mimeType: 'video/webm;codecs=vp8' });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                await enviarVideo(videoBlob);
            };

            mediaRecorder.start();

            // Lógica do Contador e Parada Automática
            timerInterval = setInterval(() => {
                tempoAtual++;
                display.innerText = tempoAtual + "s";
                
                if (tempoAtual >= tempoGravacao) {
                    finalizarGravacao();
                }
            }, 1000);
        }

        function finalizarGravacao() {
            clearInterval(timerInterval);
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
            document.getElementById('contador-display').innerText = "Processando...";
            // Pequeno delay para garantir que o blob foi gerado
        }

        async function enviarVideo(blob) {
            const uuid = "vid_" + Date.now() + ".webm";
            const formData = new FormData();
            formData.append('video', blob);
            formData.append('uuid', uuid);
            formData.append('evento', eventoId);

            try {
                const res = await fetch(`${WORKER_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    // Redireciona para a tela de "Obrigado" ou Galeria
                    window.location.href = `galeria.html?evento=${eventoId}`;
                } else {
                    alert("Erro ao enviar vídeo");
                }
            } catch (err) {
                console.error(err);
                alert("Erro na conexão");
            }
        }

        // Inicializa a câmera
        setupCamera();
    </script>
</body>
</html>
