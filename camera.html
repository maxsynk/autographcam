<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Câmera Pro - AUTOGRAPH CAM</title>
    <style>
        :root { 
            --bg-deep: #0E1A25;
            --bg-surface: #182232;
            --accent: #69829E;
            --text-main: #EFEEE9;
        }
        
        body { margin: 0; background: var(--bg-deep); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #cam-container { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #moldura-view { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            pointer-events: none; object-fit: fill; z-index: 10; 
            display: none; 
        }

        /* Overlay de Evento */
        .event-overlay {
            position: absolute; top: 30px; width: 100%; text-align: center;
            z-index: 20; color: var(--text-main); text-transform: uppercase;
            letter-spacing: 3px; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .event-sub {
            display: block; font-size: 12px; font-weight: 300; letter-spacing: 5px;
            color: var(--accent); text-transform: lowercase; margin-top: 5px;
        }

        /* Controles */
        .controls-wrapper {
            position: absolute; bottom: 60px; width: 100%;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100;
        }

        .side-btn {
            background: rgba(14, 26, 37, 0.6); border: 1.5px solid var(--accent);
            color: var(--text-main); width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 22px; backdrop-filter: blur(10px);
        }

        /* Botão disparador com animação de pulso */
        .shutter-container { position: relative; }
        .shutter-trigger { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: transparent; border: 5px solid var(--accent); 
            cursor: pointer; position: relative; z-index: 105;
            transition: transform 0.2s;
        }
        .shutter-trigger:active { transform: scale(0.9); }
        .shutter-trigger::after {
            content: ''; position: absolute; inset: -12px;
            border-radius: 50%; border: 2px solid var(--accent);
            animation: pulse-blue 1.5s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* MECANISMO DO OBTURADOR (IRIS) */
        #iris-overlay {
            position: fixed; inset: 0; z-index: 500;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
        }

        .iris-svg { width: 150vmax; height: 150vmax; transform: rotate(0deg); transition: transform 0.8s ease; }
        .iris-blade { fill: #000; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }

        /* Estado Fechado: As lâminas se encontram no centro */
        .closed .iris-blade { transform: scale(1.2); }
        .closed .iris-svg { transform: rotate(45deg); }

        /* UI de Status e Loading */
        #status { position: fixed; inset: 0; display: none; background: rgba(14, 26, 37, 0.4); color: var(--text-main); font-size: 140px; align-items: center; justify-content: center; z-index: 200; font-weight: 900; text-shadow: 0 0 30px var(--accent); }
        
        #loading { 
            position: fixed; inset: 0; display: none; background: var(--bg-deep); color: var(--text-main); 
            align-items: center; justify-content: center; z-index: 600; flex-direction: column; gap: 20px; 
        }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(105, 130, 158, 0.1); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Obturador Mecânico SVG -->
    <div id="iris-overlay" class="">
        <svg class="iris-svg" viewBox="0 0 100 100">
            <!-- Gerando 8 lâminas dinâmicas -->
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(0deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(45deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(90deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(135deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(180deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(225deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(270deg) translate(100%, 0);"></path>
            <path class="iris-blade" d="M50,50 L100,0 L100,100 Z" style="transform: rotate(315deg) translate(100%, 0);"></path>
        </svg>
    </div>

    <div id="cam-container">
        <div class="event-overlay">
            <span id="txt-evento">AUTOGRAPH CAM</span>
            <span class="event-sub">colecionando momentos</span>
        </div>
        
        <video id="preview" autoplay playsinline muted></video>
        <img id="moldura-view" alt="moldura">

        <div class="controls-wrapper">
            <div class="side-btn" onclick="window.location.href='index.html'">✕</div>
            
            <div class="shutter-container">
                <div class="shutter-trigger" id="btn-shoot"></div>
            </div>

            <div class="side-btn" onclick="toggleCamera()">🔄</div>
        </div>
    </div>

    <canvas id="canvas" width="720" height="1280" style="display:none;"></canvas>
    <div id="status"></div>
    
    <div id="loading">
        <div class="spinner"></div>
        <b style="letter-spacing: 3px; font-size: 12px; color: var(--accent);">PROCESSANDO VÍDEO...</b>
    </div>

<script>
    const WORKER_URL = "https://autographcam.maxprimefotovideo.workers.dev";
    const video = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('btn-shoot');
    const view = document.getElementById('moldura-view');
    const iris = document.getElementById('iris-overlay');
    
    let currentStream;
    let useFrontCamera = false;
    const molduraImg = new Image();
    molduraImg.crossOrigin = "anonymous"; 

    // Função para animar o obturador
    function triggerIris(callback) {
        iris.classList.add('closed');
        setTimeout(() => {
            if(callback) callback();
            setTimeout(() => {
                iris.classList.remove('closed');
            }, 300);
        }, 600);
    }

    async function startCamera() {
        if (currentStream) currentStream.getTracks().forEach(track => track.stop());
        const constraints = {
            video: { facingMode: useFrontCamera ? "user" : "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
        } catch (e) { alert("Erro ao acessar câmera."); }
    }

    function toggleCamera() {
        useFrontCamera = !useFrontCamera;
        triggerIris(() => startCamera());
    }

    window.onload = async () => {
        const config = JSON.parse(localStorage.getItem('config_atual'));
        if (config) {
            document.getElementById('txt-evento').innerText = config.nome.replace(/_/g, ' ') || "AUTOGRAPH CAM";
            let molduraPath = config.molduraUrl || config.moldura;
            if (molduraPath) {
                const urlFinal = `${WORKER_URL}/stream?id=${molduraPath.includes('id=') ? molduraPath.split('id=')[1] : molduraPath}`;
                molduraImg.src = urlFinal;
                view.src = urlFinal;
                molduraImg.onload = () => view.style.display = 'block';
            }
        }
        startCamera();
    };

    btn.onclick = () => {
        let c = 3;
        const status = document.getElementById('status');
        status.style.display = 'flex';
        status.innerText = c;
        
        let t = setInterval(() => {
            c--;
            if(c > 0) status.innerText = c;
            else { 
                clearInterval(t); 
                status.style.display = 'none'; 
                triggerIris(() => iniciarGravacao()); 
            }
        }, 1000);
    };

    function iniciarGravacao() {
        const chunks = [];
        const config = JSON.parse(localStorage.getItem('config_atual'));
        const tempo = (config ? parseInt(config.tempo) : 10) * 1000;
        const nomeEvento = config ? (config.id_fixo || config.nome) : "Geral";

        let recorder;

        const loop = () => {
            if (video.paused || video.ended) return;
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            if (molduraImg.complete) ctx.drawImage(molduraImg, 0, 0, canvas.width, canvas.height);
            if (recorder && recorder.state === "recording") requestAnimationFrame(loop);
        };

        const stream = canvas.captureStream(30);
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 5000000 });
        
        recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
        
        recorder.onstop = async () => {
            triggerIris(() => {
                document.getElementById('loading').style.display = 'flex';
                enviarVideo(chunks, nomeEvento);
            });
        };

        recorder.start();
        loop(); 
        setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, tempo);
    }

    async function enviarVideo(chunks, nomeEvento) {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const fd = new FormData();
        fd.append("video", blob);
        fd.append("uuid", "autograph_" + Date.now() + ".webm");
        fd.append("evento", nomeEvento); 

        try {
            const res = await fetch(`${WORKER_URL}/upload`, { method: "POST", body: fd });
            if(res.ok) window.location.href = "galeria.html";
            else alert("Erro no upload.");
        } catch (err) { alert("Erro de conexão."); }
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
