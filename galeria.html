<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUTOGRAPH CAM - GALERIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg-deep: #0E1A25; --bg-surface: #182232; --accent: #69829E; --text-main: #EFEEE9; }
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; }
        .sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg-deep); }
        .header { padding: 20px; border-bottom: 2px solid var(--accent); background: rgba(14, 26, 37, 0.9); backdrop-filter: blur(15px); }
        .header h1 { letter-spacing: 5px; margin: 0; text-transform: uppercase; font-size: 1.8rem; font-weight: 900; }
        .subtitle { font-size: 11px; letter-spacing: 4px; color: var(--accent); margin-top: 2px; text-transform: uppercase; }
        .search-area { padding: 15px; background: rgba(0,0,0,0.3); display: flex; justify-content: center; gap: 10px; }
        .search-area input { width: 140px; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: var(--accent); text-align: center; font-size: 18px; outline: none; }
        .btn-busca { background: var(--accent); color: var(--bg-deep); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; }
        .video-card { background: #000; border: 1px solid rgba(105, 130, 158, 0.3); border-radius: 12px; overflow: hidden; aspect-ratio: 9/16; position: relative; cursor: pointer; }
        .video-number { position: absolute; top: 10px; right: 10px; color: white; background: var(--accent); padding: 2px 8px; border-radius: 5px; font-size: 12px; z-index: 5; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; }
        #modal-zoom { position: fixed; inset: 0; background: rgba(14, 26, 37, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        #media-full { width: 85%; max-height: 70vh; border: 2px solid var(--accent); border-radius: 15px; }
        .modal-controls { margin-top: 25px; display: flex; gap: 10px; width: 85%; }
        .btn-action { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-close { background: #333; color: white; }
        .btn-download { background: var(--accent); color: var(--bg-deep); flex-grow: 1; }
    </style>
</head>
<body>
    <div class="sticky-top">
        <div class="header">
            <h1 id="logo-exit">AUTOGRAPH CAM</h1>
            <p class="subtitle">COLECIONANDO MOMENTOS</p>
            <p id="nome-evento-titulo" style="color: var(--accent); font-size: 13px; margin-top: 10px; font-weight: bold;">CARREGANDO...</p>
        </div>
        <div class="search-area">
            <input type="number" id="input-busca" placeholder="Nº VÍDEO">
            <button class="btn-busca" onclick="executarBusca()">BUSCAR</button>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div id="modal-zoom">
        <video id="media-full" controls playsinline crossorigin="anonymous"></video>
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <button id="btn-download-force" class="btn-action btn-download">BAIXAR VÍDEO</button>
        </div>
    </div>

<script>
    const WORKER_URL = "https://autographcam.maxprimefotovideo.workers.dev";
    let listaArquivosAtuais = [];
    let idPastaFixo = ""; 

    async function sincronizarInterface() {
        const urlParams = new URLSearchParams(window.location.search);
        let eventoDaUrl = urlParams.get('evento');

        // Se não tem na URL, tenta pegar o último configurado no navegador
        if(!eventoDaUrl) {
            const cache = localStorage.getItem('config_atual');
            if(cache) eventoDaUrl = JSON.parse(cache).id;
        }

        if(!eventoDaUrl) eventoDaUrl = "Geral";
        idPastaFixo = eventoDaUrl;
        
        // Atualiza o título visual
        document.getElementById('nome-evento-titulo').innerText = idPastaFixo.replace(/_/g, ' ');

        try {
            // 1. Busca os vídeos
            const resVids = await fetch(`${WORKER_URL}/listar-videos-evento?evento=${encodeURIComponent(idPastaFixo)}`);
            const vids = await resVids.json();
            
            if (JSON.stringify(vids) !== JSON.stringify(listaArquivosAtuais)) {
                listaArquivosAtuais = vids;
                renderizar();
            }

            // 2. Tenta carregar os dados do evento (nome real, etc) se necessário
            const resConf = await fetch(`${WORKER_URL}/get-config?evento=${encodeURIComponent(idPastaFixo)}`);
            const conf = await resConf.json();
            if(conf.nome) {
                document.getElementById('nome-evento-titulo').innerText = conf.nome.toUpperCase();
            }

        } catch (e) {
            console.error("Erro ao carregar dados do evento.");
        }
    }

    function renderizar() {
        const container = document.getElementById('gallery-container');
        container.innerHTML = "";
        if (listaArquivosAtuais.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5; margin-top:50px;'>Aguardando vídeos processados...</p>";
            return;
        }

        [...listaArquivosAtuais].forEach((file, index) => {
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.video_path)}`;
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `<div class="video-number">#${listaArquivosAtuais.length - index}</div><video src="${url}#t=0.5" muted playsinline></video>`;
            card.onclick = () => abrirZoom(url, file.video_path);
            container.appendChild(card);
        });
    }

    function executarBusca() {
        const num = parseInt(document.getElementById('input-busca').value);
        if (num > 0 && listaArquivosAtuais[listaArquivosAtuais.length - num]) {
            const file = listaArquivosAtuais[listaArquivosAtuais.length - num];
            abrirZoom(`${WORKER_URL}/stream?id=${encodeURIComponent(file.video_path)}`, file.video_path);
        } else { alert("Vídeo não encontrado."); }
    }

    function abrirZoom(url, path) {
        const modal = document.getElementById('modal-zoom');
        const video = document.getElementById('media-full');
        modal.style.display = 'flex';
        video.src = url;
        video.play();
        document.getElementById('btn-download-force').onclick = async () => {
            const res = await fetch(url);
            saveAs(await res.blob(), path.split('/').pop());
        };
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('media-full').src = "";
    }

    window.onload = () => {
        sincronizarInterface();
        setInterval(sincronizarInterface, 5000);
    };
</script>
</body>
</html>
