<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Galeria de Vídeos - AUTOGRAPH CAM">
    <meta property="og:description" content="Acesse seus vídeos do evento aqui.">
    <meta property="og:image" content="https://maxsynk.github.io/photomovie/seu-logo.png">
    <meta property="og:url" content="https://maxsynk.github.io/photomovie/galeria.html">
    <title>AUTOGRAPH CAM - GALERIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { 
            --bg-deep: #0E1A25;
            --bg-surface: #182232;
            --accent: #69829E;
            --text-main: #EFEEE9;
        }
        
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .sticky-top { position: sticky; top: 0; z-index: 100; background: var(--bg-deep); }
        .header { padding: 20px; border-bottom: 2px solid var(--accent); background: rgba(14, 26, 37, 0.9); backdrop-filter: blur(15px); }
        .header h1 { color: var(--text-main); letter-spacing: 5px; margin: 0; text-transform: uppercase; font-size: 1.8rem; font-weight: 900; }
        .subtitle { font-size: 11px; letter-spacing: 4px; opacity: 0.9; margin-top: 2px; text-transform: uppercase; color: var(--accent); }
        
        .event-info-container { display: flex; align-items: center; justify-content: flex-start; width: 100%; margin-top: 15px; padding-left: 10px; cursor: pointer; }
        .v-line { width: 2px; height: 30px; background: var(--accent); border-radius: 2px; margin-right: 10px; }
        #nome-evento-titulo { color: var(--accent); font-size: 13px; margin: 0; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }

        .search-area { padding: 15px; background: rgba(0,0,0,0.3); display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid rgba(105, 130, 158, 0.2); }
        .search-area input { width: 180px; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: var(--accent); text-align: center; font-size: 18px; outline: none; }
        .btn-busca { background: var(--accent); color: var(--bg-deep); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; padding-bottom: 50px; }
        .video-card { background: #000; border: 1px solid rgba(105, 130, 158, 0.3); border-radius: 12px; overflow: hidden; aspect-ratio: 9/16; position: relative; cursor: pointer; }
        .video-number { position: absolute; top: 10px; right: 10px; color: white; font-weight: bold; background: var(--accent); padding: 2px 8px; border-radius: 5px; z-index: 5; font-size: 12px; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        #modal-zoom { position: fixed; inset: 0; background: rgba(14, 26, 37, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        #media-full { width: 85%; max-height: 70vh; border: 2px solid var(--accent); border-radius: 15px; background: #000; }
        .modal-controls { margin-top: 25px; display: flex; gap: 10px; width: 85%; justify-content: center; }
        .btn-action { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-close { background: #333; color: white; }
        .btn-download { background: var(--accent); color: var(--bg-deep); }
    </style>
</head>
<body>

    <div class="sticky-top">
        <div class="header">
            <h1 id="logo-exit">AUTOGRAPH CAM</h1>
            <p class="subtitle">COLECIONANDO MOMENTOS</p>
            <div class="event-info-container" onclick="copiarLinkGaleria()">
                <div class="v-line"></div>
                <p id="nome-evento-titulo">CARREGANDO...</p>
            </div>
        </div>
        <div class="search-area">
            <input type="number" id="input-busca" placeholder="Nº VÍDEO">
            <button class="btn-busca" onclick="executarBusca()">🔍</button>
        </div>
    </div>

    <div id="gallery-container" class="gallery-grid"></div>

    <div id="modal-zoom">
        <video id="media-full" controls playsinline crossorigin="anonymous"></video>
        <div class="modal-controls">
            <button class="btn-action btn-close" onclick="fecharZoom()">FECHAR</button>
            <button id="btn-download-force" class="btn-action btn-download">BAIXAR</button>
        </div>
    </div>

<script>
    // URL ATUALIZADA
    const WORKER_URL = "https://autographcam.maxprimefotovideo.workers.dev";
    let listaArquivosAtuais = [];
    let idPastaFixo = ""; 

    function bloquearVoltar() {
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    }

    let cliquesSaida = 0;
    document.getElementById('logo-exit').onclick = () => {
        if(++cliquesSaida >= 7) window.location.href = 'index.html';
    };

    function copiarLinkGaleria() {
        const link = `${window.location.origin}${window.location.pathname}?evento=${idPastaFixo}`;
        navigator.clipboard.writeText(link).then(() => {
            alert("Link da Galeria Copiado!");
        });
    }

    async function sincronizarInterface() {
        const urlParams = new URLSearchParams(window.location.search);
        let eventoEncontrado = urlParams.get('evento');

        if(!eventoEncontrado) {
            const gDados = localStorage.getItem('config_atual');
            if(gDados) {
                const config = JSON.parse(gDados);
                eventoEncontrado = config.id_fixo || config.nome;
            }
        }

        if(!eventoEncontrado) return;
        idPastaFixo = eventoEncontrado;
        document.getElementById('nome-evento-titulo').innerText = idPastaFixo.replace(/_/g, ' ');

        try {
            const res = await fetch(`${WORKER_URL}/listar-galeria?evento=${encodeURIComponent(idPastaFixo)}`);
            const dados = await res.json();
            const novos = dados.filter(f => f.path.toLowerCase().includes('autograph_') || f.path.toLowerCase().includes('final_'));
            
            if (JSON.stringify(novos) !== JSON.stringify(listaArquivosAtuais)) {
                listaArquivosAtuais = novos;
                renderizar();
            }
        } catch (e) {
            console.error("Erro na sincronização");
        }
    }

    function renderizar() {
        const container = document.getElementById('gallery-container');
        container.innerHTML = "";
        if (listaArquivosAtuais.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5; margin-top:50px;'>Aguardando vídeos...</p>";
            return;
        }
        listaArquivosAtuais.forEach((file, index) => {
            const url = `${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`;
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `<div class="video-number">#${index + 1}</div><video src="${url}#t=0.5" muted playsinline></video>`;
            card.onclick = () => abrirZoom(url, file.path);
            container.appendChild(card);
        });
    }

    function executarBusca() {
        const input = document.getElementById('input-busca').value;
        const index = parseInt(input) - 1;
        if (listaArquivosAtuais[index]) {
            const file = listaArquivosAtuais[index];
            abrirZoom(`${WORKER_URL}/stream?id=${encodeURIComponent(file.path)}`, file.path);
            document.getElementById('input-busca').value = "";
        } else {
            alert("Vídeo não encontrado.");
        }
    }

    async function abrirZoom(url, path) {
        const modal = document.getElementById('modal-zoom');
        const video = document.getElementById('media-full');
        modal.style.display = 'flex';
        video.src = url;
        video.play();
        document.getElementById('btn-download-force').onclick = async () => {
            const res = await fetch(url);
            const blob = await res.blob();
            saveAs(blob, path.split('/').pop());
        };
    }

    function fecharZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
        document.getElementById('media-full').pause();
        document.getElementById('media-full').src = "";
    }

    window.onload = () => {
        bloquearVoltar();
        sincronizarInterface();
        setInterval(sincronizarInterface, 5000);
    };
</script>
</body>
</html>
